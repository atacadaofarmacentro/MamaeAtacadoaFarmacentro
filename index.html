<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamãe - Atacadão Farma Centro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Poppins', sans-serif; }

.hero {
    background: linear-gradient(135deg, #ec4899, #be185d);
}

.card {
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    border-radius: 24px;
}

/* PRINT / PDF */
@media print {
    body * {
        visibility: hidden;
    }

    #print-area, #print-area * {
        visibility: visible;
    }

    #print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
    }

    .no-print {
        display: none !important;
    }
}
</style>
</head>

<body class="bg-gray-50">

<div class="hero text-white text-center py-10 no-print">
    <div class="flex items-center justify-center gap-4 px-4">
        <img src="imagens/atacadao.png" class="w-24 h-24 rounded-full bg-white p-3 shadow">
        <div>
            <h1 class="text-4xl font-bold">💖 Mamãe</h1>
            <p class="text-pink-100 text-sm">Atacadão Farma Centro</p>
        </div>
        <img src="imagens/atacadao.png" class="w-24 h-24 rounded-full bg-white p-3 shadow">
    </div>
    <p class="mt-4 text-pink-100">
        Descubra sua fase da gestação 💖
    </p>
</div>

<div class="max-w-md mx-auto px-6 -mt-10 no-print">
    <div class="bg-white p-6 rounded-3xl card">
        <label class="block font-semibold text-gray-600 mb-2">
            Data da última menstruação (DUM)
        </label>

        <input type="date" id="dum"
            min="2024-01-01" max="2026-12-31"
            class="w-full p-4 rounded-xl bg-gray-100 text-lg font-bold outline-none focus:ring-2 focus:ring-pink-500">

        <button onclick="calcular()"
            class="w-full mt-5 bg-pink-600 text-white font-bold py-4 rounded-2xl active:scale-95 transition">
            CALCULAR GESTAÇÃO
        </button>

        <button onclick="abrirPlataforma()"
            class="w-full mt-3 bg-purple-600 text-white font-bold py-4 rounded-2xl active:scale-95 transition">
            🌐 Nossa Plataforma
        </button>
    </div>
</div>

<div id="print-area" class="max-w-md mx-auto px-6 mt-6">
    <div id="resultado" class="hidden bg-white p-6 rounded-3xl card">
        <div class="text-center">
            <h2 class="text-4xl font-bold text-pink-600" id="semanas"></h2>
            <p class="text-gray-500 mt-1">~ de gestação</p>

            <p class="mt-4 font-semibold text-gray-700" id="trimestre"></p>
            <p class="text-gray-500 mt-2" id="dpp"></p>
        </div>

        <div class="mt-6 p-5 rounded-2xl bg-pink-50">
            <p class="font-bold text-pink-700">💖 Dica e Suplementação:</p>
            <p id="dica" class="text-sm leading-relaxed text-pink-900"></p>
        </div>

        <div class="mt-5 p-5 rounded-2xl bg-blue-50">
            <p class="font-bold text-blue-700">🤰 O que você pode sentir:</p>
            <p id="sintomas" class="text-sm leading-relaxed text-blue-900"></p>
        </div>

        <button onclick="salvarPDF()"
            class="no-print w-full mt-6 text-white font-bold py-4 rounded-2xl
            bg-gradient-to-r from-pink-500 to-purple-600 active:scale-95 transition">
            📄 Salvar em PDF
        </button>

        <button onclick="whats()"
            class="no-print w-full mt-3 bg-green-500 text-white font-bold py-4 rounded-2xl active:scale-95 transition">
            📲 Ver produtos na loja
        </button>
    </div>

    <p class="text-[10px] text-gray-400 text-center mt-6 mb-10 no-print">
        *Este cálculo é uma estimativa educativa. <br> 
        Sempre consulte seu médico e evite a automedicação.
    </p>
</div>

<script>
// FUNÇÃO PARA CALCULAR AO APERTAR ENTER
document.getElementById("dum").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        calcular();
    }
});

function calcular() {
    const dumInput = document.getElementById("dum").value;
    const dum = new Date(dumInput);
    const hoje = new Date();

    if (!dumInput || !dum.getTime()) {
        alert("Selecione uma data válida");
        return;
    }

    // Validação extra de segurança para o ano (impede mais de 4 dígitos manuais)
    const anoSelecionado = dum.getFullYear();
    if (anoSelecionado > 2099 || anoSelecionado < 1900) {
        alert("Por favor, insira um ano válido com 4 dígitos.");
        return;
    }

    const dias = Math.floor((hoje - dum) / (1000 * 60 * 60 * 24));
    
    if (dias < 0) {
        alert("A data não pode ser no futuro!");
        return;
    }

    const semanas = Math.floor(dias / 7);
    const diasRestantes = dias % 7;

    const parto = new Date(dum);
    parto.setDate(parto.getDate() + 280);

    let trimestre = "";
    let dica = "";
    let sintomas = "";

    if (semanas <= 12) {
        trimestre = "1º Trimestre (Fase de Formação)";
        dica = "Fase do Ácido Fólico (importante para o sistema nervoso). Evite medicamentos sem orientação; o Paracetamol costuma ser a opção para dores sob orientação. Inicie seu pré-natal.";
        sintomas = "Enjoos matinais, fadiga, sensibilidade nos seios e vontade frequente de urinar.";
    } else if (semanas <= 27) {
        trimestre = "2º Trimestre (Fase de Crescimento)";
        dica = "Momento comum para iniciar Ferro e Cálcio. Use cremes hidratantes para prevenir estrias e mantenha uma boa hidratação.";
        sintomas = "Mais energia, barriga crescendo, possíveis cãibras e você começará a sentir os chutes!";
    } else if (semanas <= 42) {
        trimestre = "3º Trimestre (Fase de Preparação)";
        dica = "Atenção ao Ômega 3 e controle da pressão. Organize sua mala da maternidade e tente descansar mais.";
        sintomas = "Pés inchados, azia, falta de ar leve e contrações de treinamento.";
    } else {
        trimestre = "Pós-termo";
        dica = "Procure seu obstetra para avaliação imediata.";
        sintomas = "Ansiedade e pressão pélvica.";
    }

    document.getElementById("semanas").innerText = diasRestantes > 0 ? 
        semanas + " semanas e " + diasRestantes + " dias" : 
        semanas + " semanas";

    document.getElementById("trimestre").innerText = trimestre;
    document.getElementById("dpp").innerText =
        "Parto estimado: " + parto.toLocaleDateString("pt-BR");

    document.getElementById("dica").innerText = dica;
    document.getElementById("sintomas").innerText = sintomas;

    document.getElementById("resultado").classList.remove("hidden");
    document.getElementById("resultado").scrollIntoView({ behavior: 'smooth' });
}

function salvarPDF() {
    window.print();
}

function whats() {
    const numero = "5561992186067";
    const semanasTexto = document.getElementById("semanas").innerText;
    const msg = encodeURIComponent("Olá 💖 estou com " + semanasTexto + " e gostaria de conhecer os produtos ideais para minha fase.");
    window.open(`https://wa.me/${numero}?text=${msg}`, "_blank");
}

function abrirPlataforma() {
    window.open("https://atacadaofarma.base44.app/", "_blank");
}
</script>

</body>
</html>
