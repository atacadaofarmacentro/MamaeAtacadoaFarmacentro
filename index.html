<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamãe - Atacadão Farma Centro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Poppins', sans-serif; }

.hero {
    background: linear-gradient(135deg, #ec4899, #be185d);
}

.card {
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    border-radius: 24px;
}

/* --- CORREÇÃO TOTAL PARA O CAMPO DE DATA NO CELULAR --- */
input[type="date"] {
    appearance: none;
    -webkit-appearance: none; /* Remove estilo do iPhone/Android */
    background-color: #ffffff !important; /* Força fundo branco */
    color: #000000 !important; /* Força texto preto */
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 3.5rem;
}

/* Garante que o texto dentro do seletor de data seja preto em qualquer celular */
input[type="date"]::-webkit-datetime-edit,
input[type="date"]::-webkit-datetime-edit-fields-wrapper,
input[type="date"]::-webkit-datetime-edit-text,
input[type="date"]::-webkit-datetime-edit-month-field,
input[type="date"]::-webkit-datetime-edit-day-field,
input[type="date"]::-webkit-datetime-edit-year-field {
    color: #000000 !important;
}

/* Ajusta o ícone do calendário para aparecer no celular */
input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0); /* Garante que o ícone fique visível */
    cursor: pointer;
}

/* PRINT / PDF */
@media print {
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area { position: absolute; left: 0; top: 0; width: 100%; }
    .no-print { display: none !important; }
}
</style>
</head>

<body class="bg-gray-50">

<div class="hero text-white text-center py-10 no-print">
    <div class="flex items-center justify-center gap-4 px-4">
        <img src="imagens/atacadao.png" class="w-20 h-20 rounded-full bg-white p-2 shadow">
        <div>
            <h1 class="text-3xl font-bold">💖 Mamãe</h1>
            <p class="text-pink-100 text-xs">Atacadão Farma Centro</p>
        </div>
        <img src="imagens/atacadao.png" class="w-20 h-20 rounded-full bg-white p-2 shadow">
    </div>
    <p class="mt-4 text-pink-100 text-sm px-4 font-medium">
        Descubra sua fase da gestação 💖
    </p>
</div>

<div class="max-w-md mx-auto px-6 -mt-10 no-print">
    <div class="bg-white p-6 rounded-3xl card border border-gray-100">
        <label class="block font-bold text-gray-700 mb-3 text-center">
            Data da última menstruação (DUM)
        </label>

        <input type="date" id="dum"
            min="2024-01-01" max="2027-12-31"
            class="w-full p-4 rounded-xl bg-white text-black text-lg font-bold outline-none border-2 border-pink-200 focus:border-pink-500 shadow-sm">

        <button onclick="calcular()"
            class="w-full mt-5 bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 rounded-2xl active:scale-95 transition shadow-lg">
            CALCULAR GESTAÇÃO
        </button>

        <button onclick="abrirPlataforma()"
            class="w-full mt-3 bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-2xl active:scale-95 transition">
            🌐 Nossa Plataforma
        </button>
    </div>
</div>

<div id="print-area" class="max-w-md mx-auto px-6 mt-6">
    <div id="resultado" class="hidden bg-white p-6 rounded-3xl card mb-6">
        <div class="text-center">
            <h2 class="text-3xl font-bold text-pink-600" id="semanas"></h2>
            <p class="text-gray-500 mt-1 uppercase text-xs font-bold tracking-widest">de gestação</p>

            <p class="mt-4 font-extrabold text-gray-800 text-lg" id="trimestre"></p>
            <p class="text-gray-500 mt-2 font-medium" id="dpp"></p>
        </div>

        <div class="mt-6 p-5 rounded-2xl bg-pink-50 border border-pink-100">
            <p class="font-bold text-pink-700 text-sm">💖 Dica e Suplementação:</p>
            <p id="dica" class="text-sm leading-relaxed text-pink-900 mt-1"></p>
        </div>

        <div class="mt-5 p-5 rounded-2xl bg-blue-50 border border-blue-100">
            <p class="font-bold text-blue-700 text-sm">🤰 O que você pode sentir:</p>
            <p id="sintomas" class="text-sm leading-relaxed text-blue-900 mt-1"></p>
        </div>

        <button onclick="salvarPDF()"
            class="no-print w-full mt-6 text-white font-bold py-4 rounded-2xl
            bg-gradient-to-r from-pink-500 to-purple-600 active:scale-95 transition">
            📄 Salvar em PDF
        </button>

        <button onclick="whats()"
            class="no-print w-full mt-3 bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-2xl active:scale-95 transition">
            📲 Ver produtos na loja
        </button>
    </div>

    <p class="text-[10px] text-gray-400 text-center mb-10 no-print px-4">
        *Este cálculo é uma estimativa baseada em médias. <br> 
        Sempre consulte seu médico e evite a automedicação.
    </p>
</div>

<script>
// FUNÇÃO PARA CALCULAR AO APERTAR ENTER NO TECLADO
document.getElementById("dum").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        calcular();
    }
});

function calcular() {
    const dumInput = document.getElementById("dum").value;
    if (!dumInput) {
        alert("Por favor, selecione uma data válida.");
        return;
    }

    // Ajuste de data para evitar erro de fuso horário
    const dum = new Date(dumInput + 'T12:00:00');
    const hoje = new Date();
    const dias = Math.floor((hoje - dum) / (1000 * 60 * 60 * 24));
    
    if (dias < 0) {
        alert("A data da menstruação não pode ser no futuro!");
        return;
    }

    const semanas = Math.floor(dias / 7);
    const diasRestantes = dias % 7;
    const parto = new Date(dum);
    parto.setDate(parto.getDate() + 280);

    let trimestre = "", dica = "", sintomas = "";

    if (semanas <= 12) {
        trimestre = "1º Trimestre (Fase de Formação)";
        dica = "Fase essencial do Ácido Fólico para o bebê. Evite medicamentos sem prescrição. Inicie seu pré-natal o quanto antes.";
        sintomas = "Enjoos matinais, fadiga excessiva, sensibilidade nos seios e vontade frequente de urinar.";
    } else if (semanas <= 27) {
        trimestre = "2º Trimestre (Fase de Crescimento)";
        dica = "Período comum para suplementação de Ferro e Cálcio. Use hidratantes para prevenir estrias e mantenha a hidratação em dia.";
        sintomas = "Mais disposição, barriga aparecendo e os primeiros movimentos do bebê sendo sentidos.";
    } else if (semanas <= 42) {
        trimestre = "3º Trimestre (Fase de Preparação)";
        dica = "Atenção ao Ômega 3 (DHA) e controle da pressão arterial. Já pode preparar a mala da maternidade!";
        sintomas = "Pés inchados, azia, leve falta de ar e contrações de treinamento.";
    } else {
        trimestre = "Pós-termo";
        dica = "Consulte seu obstetra imediatamente para avaliação de segurança.";
        sintomas = "Ansiedade e pressão na região pélvica.";
    }

    // Exibição do resultado
    document.getElementById("semanas").innerText = diasRestantes > 0 ? 
        semanas + " semanas e " + diasRestantes + " dias" : 
        semanas + " semanas";

    document.getElementById("trimestre").innerText = trimestre;
    document.getElementById("dpp").innerText = "Parto estimado: " + parto.toLocaleDateString("pt-BR");
    document.getElementById("dica").innerText = dica;
    document.getElementById("sintomas").innerText = sintomas;

    document.getElementById("resultado").classList.remove("hidden");
    document.getElementById("resultado").scrollIntoView({ behavior: 'smooth' });
}

function salvarPDF() { window.print(); }

function whats() {
    const semanasTexto = document.getElementById("semanas").innerText;
    const msg = encodeURIComponent("Olá 💖 estou com " + semanasTexto + " de gestação e gostaria de conhecer os produtos ideais para minha fase.");
    window.open(`https://wa.me/5561992186067?text=${msg}`, "_blank");
}

function abrirPlataforma() {
    window.open("https://atacadaofarma.base44.app/", "_blank");
}
</script>

</body>
</html>
