<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Gestação 🌐</title>

<style>
  body{
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin:0;
    padding:0;
    text-align:center;
  }

  header{
    background: linear-gradient(90deg,#ff4da6,#8e44ad,#2ecc71);
    color:white;
    padding:20px;
    font-size:22px;
    font-weight:bold;
  }

  .box{
    background:white;
    margin:20px auto;
    padding:20px;
    max-width:500px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
  }

  input{
    width:90%;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-top:10px;
  }

  button{
    margin-top:12px;
    padding:12px;
    width:90%;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
  }

  .calc-btn{
    background:#8e44ad;
    color:white;
  }

  .pdf-btn{
    background: linear-gradient(90deg,#ff4da6,#8e44ad,#2ecc71);
    color:white;
  }

  .resultado{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
    color:#2c3e50;
  }

  .info{
    text-align:left;
    margin-top:20px;
    font-size:16px; /* 🔥 corrigido (antes estava pequeno) */
    color:#444;
    line-height:1.6;
  }

  .alerta{
    background:#fff3cd;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
    font-size:16px;
  }

</style>
</head>

<body>

<header>
CALCULAR GESTAÇÃO 🌐
</header>

<div class="box">

  <p><b>Digite a data da última menstruação:</b></p>

  <input type="date" id="data">

  <button class="calc-btn" onclick="calcular()">Calcular Gestação</button>

  <button class="pdf-btn" onclick="gerarPDF()">Salvar em PDF</button>

  <div class="resultado" id="resultado"></div>

  <div class="info">
    <h3>Dicas importantes 💡</h3>
    <p>• O cálculo é uma estimativa, não substitui médico</p>
    <p>• Consulte sempre o pré-natal</p>
    <p>• Alimentação saudável é essencial</p>

    <div class="alerta">
      ⚠️ Medicamentos comuns só devem ser usados com orientação médica.
    </div>
  </div>

</div>

<script>
function calcular(){
  let data = document.getElementById("data").value;
  if(!data){
    alert("Digite uma data!");
    return;
  }

  let inicio = new Date(data);
  let hoje = new Date();

  let diff = hoje - inicio;
  let semanas = Math.floor(diff / (1000 * 60 * 60 * 24 * 7));

  document.getElementById("resultado").innerHTML =
    `~ ${semanas} semanas de gestação (estimativa)`;
}

/* ✅ ENTER agora funciona */
document.getElementById("data").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    calcular();
  }
});

/* 📄 PDF simples (sem biblioteca, funciona em qualquer celular) */
function gerarPDF(){
  window.print();
}
</script>

</body>
</html>
