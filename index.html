<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamãe - Atacadão Farma Centro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: 'Poppins', sans-serif; }
.hero {
    background: linear-gradient(135deg, #ec4899, #be185d);
}
.card {
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    border-radius: 24px;
}
</style>
</head>
<body class="bg-gray-50">

<div class="hero text-white text-center py-10 no-print">
    <div class="flex items-center justify-center gap-4 px-4">
        <img src="imagens/atacadao.png" class="w-20 h-20 rounded-full bg-white p-2 shadow">
        <div>
            <h1 class="text-3xl font-bold">💖 Mamãe</h1>
            <p class="text-pink-100 text-xs font-semibold">Atacadão Farma Centro</p>
        </div>
        <img src="imagens/atacadao.png" class="w-20 h-20 rounded-full bg-white p-2 shadow">
    </div>
</div>

<div class="max-w-md mx-auto px-6 -mt-10 no-print">
    <div class="bg-white p-6 rounded-3xl card border border-gray-100">
        <label class="block font-bold text-gray-700 mb-3 text-center uppercase text-xs tracking-wider">
            Data da última menstruação (DUM)
        </label>
        
        <!-- Campo com máscara dd/mm/aaaa -->
        <div class="relative">
            <input 
                type="text" 
                id="dum"
                maxlength="10"
                placeholder="dd/mm/aaaa"
                class="w-full p-4 rounded-xl text-lg font-bold outline-none border-2 border-pink-100 focus:border-pink-500 shadow-inner text-center">
            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-pink-400 pointer-events-none">📅</span>
        </div>

        <button onclick="calcular()"
            class="w-full mt-5 bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 rounded-2xl active:scale-95 transition shadow-lg">
            CALCULAR GESTAÇÃO
        </button>
        <button onclick="abrirPlataforma()"
            class="w-full mt-3 bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-2xl active:scale-95 transition">
            🌐 Nossa Plataforma
        </button>
    </div>
</div>

<div id="print-area" class="max-w-md mx-auto px-6 mt-6">
    <div id="resultado" class="hidden bg-white p-6 rounded-3xl card mb-6">
        <div class="text-center">
            <h2 class="text-3xl font-bold text-pink-600" id="semanas"></h2>
            <p class="text-gray-500 mt-1 uppercase text-[10px] font-bold tracking-widest">de gestação</p>
            <p class="mt-4 font-extrabold text-gray-800 text-lg" id="trimestre"></p>
            <p class="text-gray-500 mt-2 font-medium" id="dpp"></p>
        </div>
        <div class="mt-6 p-5 rounded-2xl bg-pink-50 border border-pink-100">
            <p class="font-bold text-pink-700 text-sm">💖 Dica e Suplementação:</p>
            <p id="dica" class="text-sm leading-relaxed text-pink-900 mt-1"></p>
        </div>
        <div class="mt-5 p-5 rounded-2xl bg-blue-50 border border-blue-100">
            <p class="font-bold text-blue-700 text-sm">🤰 O que você pode sentir:</p>
            <p id="sintomas" class="text-sm leading-relaxed text-blue-900 mt-1"></p>
        </div>
        <button onclick="salvarPDF()" class="no-print w-full mt-6 text-white font-bold py-4 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-600 active:scale-95 transition">
            📄 Salvar em PDF
        </button>
        <button onclick="whats()" class="no-print w-full mt-3 bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-2xl active:scale-95 transition">
            📲 Ver produtos na loja
        </button>
    </div>
    <p class="text-[10px] text-gray-400 text-center mb-10 no-print px-4 italic">
        *Este cálculo é uma estimativa educativa. <br>
        Sempre consulte seu médico e evite a automedicação.
    </p>
</div>

<script>
// Máscara automática dd/mm/aaaa
document.getElementById("dum").addEventListener("input", function(e) {
    let value = e.target.value.replace(/\D/g, '');
    if (value.length > 8) value = value.slice(0, 8);
    
    if (value.length >= 2) value = value.slice(0,2) + '/' + value.slice(2);
    if (value.length >= 5) value = value.slice(0,5) + '/' + value.slice(5);
    
    e.target.value = value;
});

function calcular() {
    let dumStr = document.getElementById("dum").value.trim();
    
    if (!dumStr || dumStr.length !== 10) {
        alert("Por favor, insira a data completa no formato dd/mm/aaaa");
        return;
    }

    const [dia, mes, ano] = dumStr.split('/').map(Number);
    const dum = new Date(ano, mes - 1, dia);

    if (isNaN(dum.getTime())) {
        alert("Data inválida! Verifique se digitou corretamente.");
        return;
    }

    const hoje = new Date();
    hoje.setHours(0,0,0,0);
    dum.setHours(0,0,0,0);

    const dias = Math.floor((hoje - dum) / (1000 * 60 * 60 * 24));
   
    if (dias < 0) {
        alert("A data não pode ser no futuro!");
        return;
    }

    const semanas = Math.floor(dias / 7);
    const diasRestantes = dias % 7;

    const parto = new Date(dum);
    parto.setDate(parto.getDate() + 280);

    let trimestre = "", dica = "", sintomas = "";

    if (semanas <= 12) {
        trimestre = "1º Trimestre (Fase de Formação)";
        dica = "Fase essencial do Ácido Fólico. Evite medicamentos sem prescrição médica. Inicie seu pré-natal.";
        sintomas = "Enjoos matinais, fadiga, sensibilidade nos seios e sono frequente.";
    } else if (semanas <= 27) {
        trimestre = "2º Trimestre (Fase de Crescimento)";
        dica = "Momento de Ferro e Cálcio. Use hidratantes para evitar estrias e beba bastante água.";
        sintomas = "Barriga crescendo, mais disposição e os primeiros movimentos do bebê.";
    } else if (semanas <= 42) {
        trimestre = "3º Trimestre (Fase de Preparação)";
        dica = "Atenção ao Ômega 3. Monitore sua pressão e prepare sua mala da maternidade.";
        sintomas = "Inchaço nos pés, azia, falta de ar leve e contrações de treinamento.";
    } else {
        trimestre = "Pós-termo";
        dica = "Procure seu médico para avaliação.";
        sintomas = "Cansaço físico e ansiedade.";
    }

    document.getElementById("semanas").innerText = diasRestantes > 0 ?
        semanas + " semanas e " + diasRestantes + " dias" : semanas + " semanas";

    document.getElementById("trimestre").innerText = trimestre;
    document.getElementById("dpp").innerText = "Parto estimado: " + parto.toLocaleDateString("pt-BR");
    document.getElementById("dica").innerText = dica;
    document.getElementById("sintomas").innerText = sintomas;

    document.getElementById("resultado").classList.remove("hidden");
    document.getElementById("resultado").scrollIntoView({ behavior: 'smooth' });
}

function salvarPDF() { window.print(); }

function whats() {
    const semanasTexto = document.getElementById("semanas").innerText;
    const msg = encodeURIComponent("Olá 💖 estou com " + semanasTexto + " de gestação e quero ver os produtos recomendados.");
    window.open(`https://wa.me/5561992186067?text=${msg}`, "_blank");
}

function abrirPlataforma() {
    window.open("https://atacadaofarma.base44.app/", "_blank");
}
</script>
</body>
</html>
